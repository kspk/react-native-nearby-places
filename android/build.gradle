buildscript {
  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.2.1"
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.24"
  }
}

// New-arch only: this is a TurboModule (TurboModuleRegistry.getEnforcing).
// The `com.facebook.react` plugin reads `codegenConfig` from our
// package.json and emits `NativeNearbyPlacesSpec` — the Kotlin stub
// extends it. Skip on old-arch consumers so they at least see a useful
// runtime error instead of a build failure.
def isNewArchitectureEnabled() {
  return project.hasProperty("newArchEnabled") && project.newArchEnabled == "true"
}

apply plugin: 'com.android.library'
apply plugin: 'org.jetbrains.kotlin.android'

if (isNewArchitectureEnabled()) {
  apply plugin: "com.facebook.react"
}

android {
  namespace 'com.reactnativenearbyplaces'
  compileSdk 35

  defaultConfig {
    minSdkVersion 23
    targetSdkVersion 35
  }

  buildFeatures {
    buildConfig true
  }
}

repositories {
  google()
  mavenCentral()
}

dependencies {
  implementation "com.facebook.react:react-android"
}
